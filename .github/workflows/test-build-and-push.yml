name: Build And Push Test Images

on:
    workflow_dispatch:

permissions:
    contents: read

jobs:
    backend:
        name: Build And Push Backend Test Image
        if: github.ref != 'refs/heads/main'
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: 8.0.x

            - name: Run backend tests
              run: dotnet test ./api/FoodAndDrinkApi.Tests/FoodAndDrinkApi.Tests.csproj --verbosity normal

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Login to custom registry
              uses: docker/login-action@v3
              with:
                  registry: ${{ secrets.REGISTRY_URL }}
                  username: ${{ secrets.REGISTRY_USERNAME }}
                  password: ${{ secrets.REGISTRY_PASSWORD }}

            - name: Build and push backend test image
              uses: docker/build-push-action@v5
              with:
                  context: ./api
                  file: ./api/Dockerfile
                  push: true
                  tags: ${{ secrets.REGISTRY_URL }}/foodanddrink-api-test:latest,${{ secrets.REGISTRY_URL }}/foodanddrink-api-test:${{ github.sha }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

    frontend:
        name: Build And Push Frontend Test Image
        if: github.ref != 'refs/heads/main'
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"
                  cache-dependency-path: "frontend/package-lock.json"

            - name: Install dependencies
              run: cd frontend && npm install

            - name: Run frontend tests
              run: cd frontend && npm test

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Login to custom registry
              uses: docker/login-action@v3
              with:
                  registry: ${{ secrets.REGISTRY_URL }}
                  username: ${{ secrets.REGISTRY_USERNAME }}
                  password: ${{ secrets.REGISTRY_PASSWORD }}

            - name: Build and push frontend test image
              uses: docker/build-push-action@v5
              with:
                  context: ./frontend
                  file: ./frontend/Dockerfile
                  build-args: |
                      BACKEND_URL=http://foodanddrink-api-test:8070
                  push: true
                  tags: ${{ secrets.REGISTRY_URL }}/foodanddrink-frontend-test:latest,${{ secrets.REGISTRY_URL }}/foodanddrink-frontend-test:${{ github.sha }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
