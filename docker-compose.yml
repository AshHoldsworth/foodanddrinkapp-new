services:
    postgres:
        image: postgres:16
        container_name: foodanddrink-postgres
        restart: unless-stopped
        ports:
            - "5432:5432"
        environment:
            POSTGRES_DB: FoodAndDrinkApp
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
        volumes:
            - postgres-data:/var/lib/postgresql/data

    api:
        build:
            context: ./api
            dockerfile: Dockerfile
        container_name: foodanddrink-api
        depends_on:
            - postgres
        environment:
            ASPNETCORE_URLS: http://+:8080
            JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env or shell environment}

            PostgresSql__ConnectionString: Host=postgres;Database=FoodAndDrinkApp;Username=postgres;Password=${POSTGRES_PASSWORD:-postgres}
        ports:
            - "8080:8080"

    frontend:
        build:
            context: ./frontend
            dockerfile: Dockerfile
            args:
                BACKEND_URL: http://api:8080
        container_name: foodanddrink-frontend
        depends_on:
            - api
        environment:
            JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env or shell environment}
        ports:
            - "3000:3000"

volumes:
    postgres-data:
