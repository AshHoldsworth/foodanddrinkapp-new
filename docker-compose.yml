services:
    mongo:
        image: mongo:7
        container_name: foodanddrink-mongo
        restart: unless-stopped
        ports:
            - "27018:27017"
        volumes:
            - mongo-data:/data/db

    api:
        build:
            context: ./api
            dockerfile: Dockerfile
        container_name: foodanddrink-api
        depends_on:
            - mongo
        environment:
            ASPNETCORE_URLS: http://+:8080
            JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env or shell environment}

            MongoDB__ConnectionString: mongodb://mongo:27017
            MongoDB__DatabaseName: FoodAndDrinkApp
            MongoDB__MealCollection: meals
            MongoDB__DrinkCollection: drinks
            MongoDB__IngredientCollection: ingredients
            MongoDB__InventoryCollection: inventory
            MongoDB__UserGroupCollection: userGroups
            MongoDB__MealPlanCollection: mealPlans
            MongoDB__ShoppingListCollection: shoppingLists
            MongoDB__UserCollection: users
        ports:
            - "8080:8080"

    frontend:
        build:
            context: ./frontend
            dockerfile: Dockerfile
            args:
                BACKEND_URL: http://api:8080
        container_name: foodanddrink-frontend
        depends_on:
            - api
        environment:
            JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env or shell environment}
        ports:
            - "3000:3000"

volumes:
    mongo-data:
